<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* Critical: prevent FOUC – body bg/color before CSS loads */
      body { background-color: hsl(215 35% 7%); color: hsl(210 20% 88%); min-height: 100vh; margin: 0; }
    </style>
    <title>Xphere Group | Auto Auction Vehicle Inspections</title>
    <style>
      /* Critical fallback – ensures content is visible if CSS loads late */
      #root { min-height: 100vh; display: block; }
      main, .dashboard { display: block; }
      /* No vertical padding — it was clipping the last blocks of tall sections vs 100vh hero */
      main { min-height: 100vh; padding: 0; }
      .container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 2rem; box-sizing: border-box; }
      .dashboard h1, .dashboard p, .dashboard label, .dashboard input, .dashboard select, .dashboard button, .dashboard a { color: #e2e8f0; }
      .navbar { display: flex; color: #e2e8f0; }
    </style>
  </head>
  <body style="background-color: hsl(215 35% 7%); color: hsl(210 20% 88%); min-height: 100vh; margin: 0;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
